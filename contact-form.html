<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>THEEJAY TAGAMA - Contact Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
<form>
  <div class="container bg-white p-4 rounded shadow">
    <h2 class="mb-4 text-primary text-center">Contact Us</h2>
    <div class="row mb-3">
      <div class="col-md-6">
        <label for="fullName" class="form-label">Full Name</label>
        <input
          type="text"
          class="form-control form-control-lg"
          id="fullName"
          aria-label="Full Name"
          placeholder="Enter your full name">
      </div>

      <div class="col-md-6">
        <label for="emailAddress" class="form-label">Email Address</label>
        <input
          type="email"
          class="form-control form-control-sm"
          id="emailAddress"
          aria-label="Email Address"
          placeholder="Enter your email">
      </div>

    </div>

    <div class="mb-3">
      <label for="message" class="form-label">Message</label>
      <textarea
        class="form-control"
        id="message"
        rows="4"
        aria-describedby="messageHelp"
        placeholder="Write your message here..."></textarea>
      <span id="messageHelp" class="form-text text-muted">Our team will respond within 6-7 business days.</span>
    </div>

    <div class="mb-3">
      <label class="form-label">Preferred Contact Method</label>
      <div>

        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="checkEmail" value="email">
          <label class="form-check-label" for="checkEmail">Email</label>
        </div>

        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="checkPhone" value="phone">
          <label class="form-check-label" for="checkPhone">Phone</label>
        </div>

        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="checkWhatsapp" value="whatsapp">
          <label class="form-check-label" for="checkWhatsapp">WhatsApp</label>
        </div>

      </div>
    </div>

    <div class="mb-3">
      <label for="favoriteColor" class="form-label">Favorite Color</label>
      <input
        type="color"
        class="form-control form-control-color"
        id="favoriteColor"
        value="#000080"
        aria-label="Favorite Color">
    </div>

    <div class="mb-3">
      <label for="userId" class="form-label">User ID</label>
      <input
        type="text"
        class="form-control"
        id="userId"
        value="UEMNL-2024014"
        disabled>
      <span class="form-text text-muted">This field is automatically assigned.</span>
    </div>

    <div class="mb-3">
      <label for="accountType" class="form-label">Account Type</label>
      <input
        type="text"
        class="form-control-plaintext"
        id="accountType"
        value="Student"
        readonly>
    </div>
    <div class="text-center">
        <button type="submit" class="btn btn-primary ">Submit</button>
        <button type="reset" class="btn btn-danger">Reset</button>
    </div>

  </div>
</form>
</body>
</html>
